<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I miei animali Preferiti</title>
    <link rel="stylesheet" href="style.css" />

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>

    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale" />
        </figure>

        <div class="lista-animali"></div>
    </main>

    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>

    <script type="text/babel">
        const { createRoot } = ReactDOM;
        const { useState } = React;

        function Modal({
            title,
            content,
            show = false,
            onClose = () => { },
            onConfirm = () => { },
            loading = false
        }) {
            return show && ReactDOM.createPortal(
                <div className="modal-container">
                    <div className="modal">
                        <h2>{title}</h2>

                        <div className="modal-content">
                            {content}
                        </div>

                        <div className="modal-actions">
                            <button
                                className="btn btn-secondary"
                                onClick={onClose}
                                disabled={loading}
                            >
                                Annulla
                            </button>

                            <button
                                className="btn btn-primary"
                                onClick={onConfirm}
                                disabled={loading}
                            >
                                {loading ? "Caricamento..." : "Conferma"}
                            </button>
                        </div>
                    </div>
                </div>,
                document.body
            );
        }

        const ReactApp = () => {
            const [animals, setAnimals] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [animalName, setAnimalName] = useState("");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");

            const defaultImage = "https://placehold.co/400x250?text=No+Image";

            function handleOpenModal() {
                setShowModal(true);
                setAnimalName("");
                setError("");
            }

            function handleCloseModal() {
                if (loading) return;

                setShowModal(false);
                setAnimalName("");
                setError("");
            }

            async function handleConfirm() {
                if (loading) return;

                if (!animalName) {
                    setError("Inserisci il nome di un animale");
                    return;
                }

                setLoading(true);
                setError("");

                try {
                    const response = await fetch(
                        `http://localhost:3333/animals?search=${animalName}`
                    );

                    if (!response.ok) {
                        throw new Error("Errore nella risposta del server");
                    }

                    const data = await response.json();

                    if (!Array.isArray(data) || data.length === 0) {
                        setError("Nessun animale trovato");
                        return;
                    }

                    const firstAnimal = data[0];

                    const animalCard = {
                        name: firstAnimal.name || animalName,
                        description: firstAnimal.description || "Descrizione non disponibile",
                        image: firstAnimal.image || defaultImage
                    };

                    setAnimals((prevAnimals) => [...prevAnimals, animalCard]);
                    setShowModal(false);
                    setAnimalName("");
                    setError("");
                } catch (err) {
                    setError("Errore durante la ricerca dell'animale");
                } finally {
                    setLoading(false);
                }
            }

            return (
                <div className="container">
                    <button onClick={handleOpenModal}>Aggiungi Animale</button>

                    {animals.length > 0 ? (
                        <section className="cards-grid">
                            {animals.map((animal, index) => (
                                <article className="animal-card" key={index}>
                                    
                                    <img
                                        src={animal.image}
                                        alt={animal.name}
                                        className="animal-card-image" />

                                    <div className="animal-card-body">
                                        <h3>{animal.name}</h3>
                                        <p>{animal.description}</p>
                                    </div>
                                </article>
                            ))}
                        </section>
                    ) : (
                        <p className="empty-message">Nessun animale aggiunto.</p>
                    )}

                    <Modal
                        title="Aggiungi un animale"
                        show={showModal}
                        onClose={handleCloseModal}
                        onConfirm={handleConfirm}
                        loading={loading}
                        content={
                            <div className="modal-form">
                                <input
                                    type="text"
                                    placeholder="Scrivi il nome di un animale"
                                    value={animalName}
                                    onChange={(e) => {
                                        setAnimalName(e.target.value);
                                        if (error) {
                                            setError("");
                                        }
                                    }}
                                    className="modal-input"
                                    disabled={loading}
                                    onKeyDown={(e) => {
                                        if (e.key === "Enter") {
                                            handleConfirm();
                                        }
                                    }}
                                />

                                {error && <p className="error-message">{error}</p>}
                            </div>
                        }
                    />
                </div>
            );
        };

        createRoot(document.querySelector(".lista-animali")).render(<ReactApp />);
    </script>
</body>

</html>
